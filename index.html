<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="Doctors appointment logo.png">
    <link rel="apple-touch-icon" href="Doctors appointment logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor's Appointment | Admin</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        :root { 
            --doc-navy: #1A3668; 
            --doc-green: #4D9345;
            --doc-accent: #E8F0F8;
        }

        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: #f0f4f7; margin: 0; padding: 10px; }
        
        header { 
            text-align: center; 
            padding: 20px; 
            background: white; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border-bottom: 6px solid var(--doc-green);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .logo-img {
            height: 90px; 
            margin-bottom: 10px; 
            object-fit: contain;
        }

        .header-title {
            margin: 0;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .text-navy { color: var(--doc-navy); }
        .text-green { color: var(--doc-green); }

        #calendar-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        /* Calendar Buttons & Labels */
        .fc-toolbar-title { color: var(--doc-navy) !important; font-weight: 700; }
        .fc-button-primary { background-color: var(--doc-navy) !important; border: none !important; }
        .fc-button-primary:hover { background-color: var(--doc-green) !important; }

        /* Event Bubbles */
        .fc-event { 
            cursor: pointer; 
            padding: 5px !important; 
            border: none !important;
            background-color: var(--doc-navy) !important;
            border-left: 4px solid var(--doc-green) !important;
            margin-bottom: 3px !important;
        }

        .event-title-stack { color: white; line-height: 1.2; overflow: hidden; }
        .event-name { font-weight: bold; display: block; text-transform: uppercase; font-size: 0.85em; }
        .event-time { font-weight: normal; opacity: 0.9; font-size: 0.75em; }

        /* Modal */
        #booking-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: white; padding: 25px; z-index: 100;
            border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 90; backdrop-filter: blur(3px); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--doc-navy); margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        .save-btn { background: var(--doc-green); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .close-btn { background: transparent; color: #888; margin-top: 10px; border: none; width: 100%; padding: 10px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <img src="Doctors appointment logo.png" alt="Logo" class="logo-img">
        <h1 class="header-title">
            <span class="text-navy">DOCTOR'S</span> 
            <span class="text-green">APPOINTMENT</span>
        </h1>
    </header>

    <div id="calendar-card">
        <div id="calendar"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    
    <div id="booking-modal">
        <h3 id="selected-date-display" style="color:var(--doc-navy); margin:0 0 20px 0;">New Appointment</h3>
        
        <div class="form-group">
            <label>PATIENT NAME</label>
            <input type="text" id="patient-name" placeholder="Full name">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>START TIME</label>
                <select id="start-time"></select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>END TIME</label>
                <select id="end-time"></select>
            </div>
        </div>

        <div class="form-group">
            <label>NOTES / REASON</label>
            <textarea id="notes" rows="3" placeholder="Visit details..."></textarea>
        </div>

        <button class="save-btn" onclick="saveAppointment()">CONFIRM APPOINTMENT</button>
        <button class="close-btn" onclick="closeModal()">CANCEL</button>
    </div>

    <script>
        let calendar;
        let selectedDateStr;
        let appointments = JSON.parse(localStorage.getItem('doc_calendar_data')) || [];

        function populateTimes() {
            const startSelect = document.getElementById('start-time');
            const endSelect = document.getElementById('end-time');
            for(let i=7; i<=19; i++) {
                let h = i > 12 ? i-12 : i;
                let ampm = i >= 12 ? 'PM' : 'AM';
                let display = `${h}:00 ${ampm}`;
                let value = i < 10 ? `0${i}:00` : `${i}:00`;
                startSelect.add(new Option(display, value));
                endSelect.add(new Option(display, value));
            }
            endSelect.selectedIndex = 1;
        }
        populateTimes();

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                height: 'auto',
                events: appointments,
                eventContent: function(arg) {
                    let stack = document.createElement('div');
                    stack.className = 'event-title-stack';
                    stack.innerHTML = `<span class="event-name">${arg.event.title}</span><span class="event-time">${arg.timeText}</span>`;
                    return { domNodes: [stack] };
                },
                dateClick: function(info) { openModal(info.dateStr); },
                eventClick: function(info) {
                    const notes = info.event.extendedProps.notes || "No notes";
                    if(confirm(`PATIENT: ${info.event.title}\nNOTES: ${notes}\n\nDelete?`)) {
                        info.event.remove();
                        appointments = appointments.filter(e => !(e.title === info.event.title && e.start === info.event.startStr));
                        localStorage.setItem('doc_calendar_data', JSON.stringify(appointments));
                    }
                }
            });
            calendar.render();
        });

        function openModal(date) {
            selectedDateStr = date;
            document.getElementById('selected-date-display').innerText = "Schedule: " + date;
            document.getElementById('booking-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function saveAppointment() {
            const name = document.getElementById('patient-name').value;
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;
            const notes = document.getElementById('notes').value;
            if(!name) { alert("Enter patient name"); return; }
            const newEvent = {
                title: name,
                start: `${selectedDateStr}T${startTime}:00`,
                end: `${selectedDateStr}T${endTime}:00`,
                extendedProps: { notes: notes },
                allDay: false
            };
            appointments.push(newEvent);
            localStorage.setItem('doc_calendar_data', JSON.stringify(appointments));
            calendar.addEvent(newEvent);
            closeModal();
            document.getElementById('patient-name').value = "";
            document.getElementById('notes').value = "";
        }

        function closeModal() {
            document.getElementById('booking-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>>
