<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brazilian Cleaning | Internal Booking</title>
    <style>
        :root {
            --brazil-green: #2D9546;
            --brazil-blue: #1E5B9A;
            --brazil-gold: #F9C21C;
            --light-bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 30px 20px;
            text-align: center;
            background: white;
            border-bottom: 4px solid var(--brazil-gold);
        }

        .logo-text {
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -1px;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        h3 {
            margin-top: 0;
            color: var(--brazil-blue);
            font-size: 16px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--brazil-green);
            outline: none;
        }

        .service-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .service-btn {
            border: 2px solid #eee;
            padding: 15px 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            font-size: 14px;
        }

        .service-btn.active {
            border-color: var(--brazil-green);
            background-color: #eef9f0;
            color: var(--brazil-green);
        }

        .footer {
            margin-top: auto;
            padding: 20px;
        }

        .book-btn {
            width: 100%;
            background-color: var(--brazil-green);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(45, 149, 70, 0.3);
        }

        .book-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo-text">
            <span style="color:var(--brazil-green)">BRAZILIAN</span> 
            <span style="color:var(--brazil-blue)">CLEANING</span>
        </div>
    </header>

    <div class="section">
        <h3>1. Appointment Details</h3>
        <label>Date</label>
        <input type="date" id="bookDate">
        
        <label style="display:block; margin-top:15px;">Time (8 AM - 6 PM)</label>
        <select id="bookTime">
            </select>
    </div>

    <div class="section">
        <h3>2. Service Type</h3>
        <div class="service-grid">
            <div class="service-btn" onclick="setService(this, 'Standard')">Standard</div>
            <div class="service-btn" onclick="setService(this, 'Deep Clean')">Deep Clean</div>
            <div class="service-btn" onclick="setService(this, 'Move In/Out')">Move In/Out</div>
            <div class="service-btn" onclick="setService(this, 'Office')">Office</div>
        </div>
    </div>

    <div class="section">
        <h3>3. Client Info</h3>
        <input type="text" id="clientName" placeholder="Client Name">
        <input type="text" id="clientAddress" placeholder="Address">
    </div>

    <div class="footer">
        <button class="book-btn" onclick="sendToWhatsApp()">SEND TO WHATSAPP</button>
    </div>
</div>

<script>
    // 1. Setup Time Slots
    const timeSelect = document.getElementById('bookTime');
    for(let h=8; h<=18; h++) {
        let suffix = h >= 12 ? "PM" : "AM";
        let displayHour = h > 12 ? h - 12 : h;
        if(h === 12) displayHour = 12;
        
        let option = document.createElement('option');
        option.value = `${displayHour}:00 ${suffix}`;
        option.text = `${displayHour}:00 ${suffix}`;
        timeSelect.appendChild(option);
    }

    // 2. Handle Service Selection
    let selectedService = "";
    function setService(el, name) {
        document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedService = name;
    }

    // 3. Send Data to her WhatsApp
    function sendToWhatsApp() {
        const date = document.getElementById('bookDate').value;
        const time = document.getElementById('bookTime').value;
        const name = document.getElementById('clientName').value;
        const addr = document.getElementById('clientAddress').value;
        const phone = "1234567890"; // <-- PUT YOUR WIFE'S PHONE NUMBER HERE (Numbers only)

        if(!date || !selectedService || !name) {
            alert("Please fill in Date, Service, and Name!");
            return;
        }

        const message = `*New Cleaning Appointment*%0A` +
                        `--------------------------%0A` +
                        `*Service:* ${selectedService}%0A` +
                        `*Date:* ${date}%0A` +
                        `*Time:* ${time}%0A` +
                        `*Client:* ${name}%0A` +
                        `*Address:* ${addr}`;

        window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
