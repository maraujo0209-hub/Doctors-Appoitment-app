<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BC | Admin Calendar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        :root { --green: #2D9546; --blue: #1E5B9A; --gold: #F9C21C; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        
        header { text-align: center; padding: 15px; background: white; border-radius: 15px; margin-bottom: 10px; border-bottom: 4px solid var(--gold); }
        .logo-img { height: 50px; margin-bottom: 5px; }
        
        #calendar-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        /* Event Box Styling */
        .fc-event { 
            cursor: pointer; 
            padding: 4px !important; 
            border: none !important;
            background-color: var(--blue) !important;
            margin-bottom: 2px !important;
        }

        /* Custom Inner Event Styling */
        .event-title-stack { font-size: 0.85em; color: white; line-height: 1.2; }
        .event-name { font-weight: bold; display: block; text-transform: uppercase; font-size: 0.9em; }
        .event-time { font-weight: normal; opacity: 0.9; font-size: 0.8em; }

        /* Modal Styling */
        #booking-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 380px; background: white; padding: 25px; z-index: 100;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 90; backdrop-filter: blur(2px); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #666; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        .save-btn { background: var(--green); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .close-btn { background: transparent; color: #888; margin-top: 10px; border: none; width: 100%; padding: 10px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.pgn.pgn" alt="Brazilian Cleaning" class="logo-img" onerror="this.style.display='none'">
            <div style="font-weight:900; font-size:22px;">
                <span style="color:var(--green)">BRAZILIAN</span> <span style="color:var(--blue)">CLEANING</span>
            </div>
        </div>
    </header>

    <div id="calendar-card">
        <div id="calendar"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    
    <div id="booking-modal">
        <h3 id="selected-date-display" style="color:var(--blue); margin:0 0 20px 0;">New Appointment</h3>
        
        <div class="form-group">
            <label>CLIENT NAME</label>
            <input type="text" id="client-name" placeholder="Name">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>START</label>
                <select id="start-time"></select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>END</label>
                <select id="end-time"></select>
            </div>
        </div>

        <div class="form-group">
            <label>NOTES & ADDRESS</label>
            <textarea id="notes" rows="3" placeholder="Address..."></textarea>
        </div>

        <button class="save-btn" onclick="saveAppointment()">SAVE TO CALENDAR</button>
        <button class="close-btn" onclick="closeModal()">CANCEL</button>
    </div>

    <script>
        let calendar;
        let selectedDateStr;
        let appointments = JSON.parse(localStorage.getItem('cleaning_appts')) || [];

        function populateTimes() {
            const startSelect = document.getElementById('start-time');
            const endSelect = document.getElementById('end-time');
            for(let i=7; i<=20; i++) {
                let h = i > 12 ? i-12 : i;
                let ampm = i >= 12 ? 'PM' : 'AM';
                let display = `${h}:00 ${ampm}`;
                let value = i < 10 ? `0${i}:00` : `${i}:00`;
                startSelect.add(new Option(display, value));
                endSelect.add(new Option(display, value));
            }
            endSelect.selectedIndex = 2;
        }
        populateTimes();

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                height: 'auto',
                events: appointments,
                // THE FIX: This part forces the name above the time
                eventContent: function(arg) {
                    let timeText = arg.timeText; // e.g., "8:00 AM"
                    let nameText = arg.event.title; // e.g., "John Smith"
                    
                    let arrayOfDomNodes = [
                        Object.assign(document.createElement('div'), {
                            className: 'event-title-stack',
                            innerHTML: `<span class="event-name">${nameText}</span><span class="event-time">${timeText}</span>`
                        })
                    ];
                    return { domNodes: arrayOfDomNodes };
                },
                dateClick: function(info) {
                    openModal(info.dateStr);
                },
                eventClick: function(info) {
                    const notes = info.event.extendedProps.notes || "No notes";
                    if(confirm(`CLIENT: ${info.event.title}\nNOTES: ${notes}\n\nDelete this?`)) {
                        info.event.remove();
                        appointments = appointments.filter(e => 
                            !(e.title === info.event.title && e.start === info.event.startStr)
                        );
                        localStorage.setItem('cleaning_appts', JSON.stringify(appointments));
                    }
                }
            });
            calendar.render();
        });

        function openModal(date) {
            selectedDateStr = date;
            document.getElementById('selected-date-display').innerText = "Book: " + date;
            document.getElementById('booking-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function saveAppointment() {
            const name = document.getElementById('client-name').value;
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;
            const notes = document.getElementById('notes').value;

            if(!name) { alert("Please enter a client name"); return; }

            const newEvent = {
                title: name,
                start: `${selectedDateStr}T${startTime}:00`,
                end: `${selectedDateStr}T${endTime}:00`,
                extendedProps: { notes: notes },
                allDay: false
            };

            appointments.push(newEvent);
            localStorage.setItem('cleaning_appts', JSON.stringify(appointments));
            calendar.addEvent(newEvent);
            closeModal();
            document.getElementById('client-name').value = "";
            document.getElementById('notes').value = "";
        }

        function closeModal() {
            document.getElementById('booking-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
